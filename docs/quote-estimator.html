<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quote Estimator</title>
  <style>
    :root {
      --bg: #f4f0e8;
      --paper: #fffaf2;
      --ink: #182126;
      --muted: #5f6a6e;
      --line: #d9cfbd;
      --accent: #0e7a6d;
      --accent-2: #d45b35;
      --shadow: 0 20px 60px rgba(24, 33, 38, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(212, 91, 53, 0.10), transparent 28%),
        radial-gradient(circle at top right, rgba(14, 122, 109, 0.10), transparent 24%),
        linear-gradient(180deg, #f7f1e7 0%, #f1ebe0 100%);
      color: var(--ink);
      font-family: Georgia, "Noto Serif SC", "Songti SC", serif;
    }
    .wrap {
      width: min(960px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 32px 0 64px;
    }
    .card {
      background: rgba(255, 250, 242, 0.9);
      border: 1px solid rgba(217, 207, 189, 0.86);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 24px;
    }
    h1, h2 { margin: 0 0 12px; }
    p { color: var(--muted); line-height: 1.7; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 20px;
    }
    label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      color: var(--ink);
    }
    select {
      width: 100%;
      min-height: 46px;
      border-radius: 14px;
      border: 1px solid var(--line);
      padding: 0 12px;
      background: #fff;
      color: var(--ink);
      font-size: 15px;
    }
    .result {
      margin-top: 24px;
      padding: 20px;
      border-radius: 20px;
      background: rgba(14, 122, 109, 0.08);
      border: 1px solid rgba(14, 122, 109, 0.18);
    }
    .range {
      font-size: 34px;
      margin: 6px 0;
      color: var(--accent);
    }
    .note {
      font-size: 14px;
      color: var(--muted);
    }
    .actions {
      margin-top: 22px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 16px;
      border-radius: 999px;
      text-decoration: none;
      border: 1px solid var(--ink);
      color: var(--ink);
    }
    .btn.primary {
      background: var(--ink);
      color: #f7f1e7;
    }
    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Estimate Budget</h1>
      <p>
        This page gives a fast pre-quote range before a real proposal is written. It is not a final price.
      </p>

      <div class="grid">
        <div>
          <label for="serviceType">Service Type</label>
          <select id="serviceType">
            <option value="automation">Automation Script</option>
            <option value="report">Report Delivery</option>
            <option value="workflow">AI Workflow Setup</option>
            <option value="dev">Developer Support</option>
          </select>
        </div>
        <div>
          <label for="scope">Scope Complexity</label>
          <select id="scope">
            <option value="light">Light</option>
            <option value="standard">Standard</option>
            <option value="complex">Complex</option>
          </select>
        </div>
        <div>
          <label for="urgency">Delivery Urgency</label>
          <select id="urgency">
            <option value="normal">Normal</option>
            <option value="fast">Within 3 days</option>
            <option value="rush">Within 24-48h</option>
          </select>
        </div>
        <div>
          <label for="reuse">Repeat Usage Potential</label>
          <select id="reuse">
            <option value="oneoff">One-off</option>
            <option value="repeat">Repeatable</option>
          </select>
        </div>
      </div>

      <div class="result">
        <div class="note">Recommended Range</div>
        <div class="range" id="range">¥699 - ¥999</div>
        <p id="explanation">
          Good fit for small automation work with clear inputs and limited exceptions.
        </p>
      </div>

      <div class="actions">
        <a class="btn primary" href="https://github.com/booynal/ai-service-workbench/issues/new/choose">Submit Project Brief</a>
        <a class="btn" href="./examples.md">See Example Projects</a>
      </div>
    </section>
  </main>

  <script>
    const pricing = {
      automation: { light: [699, 999], standard: [1499, 2499], complex: [2500, 4500] },
      report: { light: [299, 499], standard: [599, 999], complex: [1000, 1800] },
      workflow: { light: [999, 1499], standard: [1999, 2999], complex: [3000, 5000] },
      dev: { light: [499, 999], standard: [1000, 1999], complex: [2000, 4000] }
    };

    function calcEstimate() {
      const serviceType = document.getElementById('serviceType').value;
      const scope = document.getElementById('scope').value;
      const urgency = document.getElementById('urgency').value;
      const reuse = document.getElementById('reuse').value;

      let [low, high] = pricing[serviceType][scope];

      if (urgency === 'fast') {
        low = Math.round(low * 1.15);
        high = Math.round(high * 1.15);
      }
      if (urgency === 'rush') {
        low = Math.round(low * 1.3);
        high = Math.round(high * 1.3);
      }
      if (reuse === 'repeat' && serviceType !== 'report') {
        low = Math.round(low * 1.1);
        high = Math.round(high * 1.2);
      }

      document.getElementById('range').textContent = `¥${low} - ¥${high}`;
      document.getElementById('explanation').textContent =
        `This estimate assumes ${scope} scope, ${urgency} delivery, and ${reuse} usage. Final pricing still depends on real files, rules, and exception handling.`;
    }

    for (const id of ['serviceType', 'scope', 'urgency', 'reuse']) {
      document.getElementById(id).addEventListener('change', calcEstimate);
    }
    calcEstimate();
  </script>
</body>
</html>
